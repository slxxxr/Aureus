name: CI

on:
  pull_request:
    branches: [main]

# TODO: remove once actions/* support Node 24 — https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: backend/

      - name: Build
        run: dotnet build backend/Aureus.sln --configuration Release

      - name: Test
        run: dotnet test backend/Aureus.sln --configuration Release --no-build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  i18n-sync:
    name: i18n sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check key parity
        run: node .github/scripts/check-i18n.js
