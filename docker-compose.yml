services:
  postgres:
    image: postgres:16-alpine
    container_name: aureus-postgres
    environment:
      POSTGRES_DB: aureus_db
      POSTGRES_USER: aureus_user
      POSTGRES_PASSWORD: aureus_password
    ports:
      - "5432:5432"
    volumes:
      - aureus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aureus_user -d aureus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  aureus_postgres_data:
